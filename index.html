<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>NHS BD App — Harmony Fire</title>
<style>
  :root{
    --navy:#1B2A5E; --charcoal:#1E1E1E; --ink:#2B2B2B;
    --panel:#F4F6FA; --line:#E2E7F0; --white:#fff;
    --good:#1E7F4F; --bad:#C0392B; --muted:#7A879C;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Segoe UI',Montserrat,system-ui,Arial,sans-serif;color:var(--ink);background:var(--panel)}
  a{color:var(--navy)}
  /* ---- top bar ---- */
  header{background:var(--charcoal);color:#fff;display:flex;align-items:center;gap:24px;padding:0 22px;height:58px}
  .logo{display:flex;align-items:center;gap:9px;font-weight:700;font-size:20px;letter-spacing:.3px}
  .logo .mark{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border:2px solid #fff;border-radius:50%;font-size:13px;font-weight:700}
  .logo small{font-weight:400;opacity:.7;font-size:12px;margin-left:6px}
  nav{display:flex;gap:4px;margin-left:8px;flex:1}
  nav button{background:none;border:0;color:#cfd6e6;padding:8px 13px;border-radius:7px;cursor:pointer;font-size:14px}
  nav button:hover{background:rgba(255,255,255,.08);color:#fff}
  nav button.active{background:var(--navy);color:#fff}
  .who{font-size:13px;color:#cfd6e6;display:flex;align-items:center;gap:12px}
  .who button{background:none;border:1px solid #4a4a4a;color:#cfd6e6;border-radius:6px;padding:5px 10px;cursor:pointer}
  /* ---- layout ---- */
  main{max-width:1180px;margin:0 auto;padding:24px 22px 60px}
  h1{font-size:22px;color:var(--navy);margin:4px 0 2px}
  .sub{color:var(--muted);font-size:13px;margin-bottom:18px}
  .toggle{display:inline-flex;background:#fff;border:1px solid var(--line);border-radius:9px;padding:3px;margin-bottom:18px}
  .toggle button{border:0;background:none;padding:7px 15px;border-radius:7px;cursor:pointer;font-size:13px;color:var(--muted)}
  .toggle button.active{background:var(--navy);color:#fff}
  .group{margin-bottom:26px}
  .group h2{font-size:14px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:0 0 10px;font-weight:700}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:15px 16px}
  .card .label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .card .val{font-size:26px;font-weight:700;color:var(--navy);margin:6px 0 2px}
  .card .tgt{font-size:12px;color:var(--muted)}
  .bar{height:7px;border-radius:5px;background:#EBEFF6;margin-top:11px;overflow:hidden}
  .bar > i{display:block;height:100%;border-radius:5px;background:var(--navy)}
  .pill{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;margin-left:8px}
  .pill.good{background:#E4F3EB;color:var(--good)} .pill.bad{background:#F8E6E4;color:var(--bad)}
  /* ---- login ---- */
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--charcoal)}
  .login{background:#fff;border-radius:16px;padding:34px 32px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,.35)}
  .login .logo{color:var(--charcoal);justify-content:center;margin-bottom:6px}
  .login .logo .mark{border-color:var(--charcoal)}
  .login h3{text-align:center;color:var(--navy);margin:6px 0 2px;font-size:18px}
  .login p.hint{text-align:center;color:var(--muted);font-size:12px;margin:0 0 20px}
  label.f{display:block;font-size:12px;color:var(--muted);margin:12px 0 4px}
  input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px}
  .btn{width:100%;margin-top:18px;background:var(--navy);color:#fff;border:0;border-radius:9px;padding:12px;font-size:15px;font-weight:600;cursor:pointer}
  .btn:disabled{opacity:.6;cursor:default}
  .btn.secondary{background:none;color:var(--navy);margin-top:8px;font-weight:500;font-size:13px}
  .err{color:var(--bad);font-size:13px;margin-top:12px;text-align:center;min-height:16px}
  .empty{background:#fff;border:1px dashed var(--line);border-radius:12px;padding:30px;text-align:center;color:var(--muted)}
  .soon{background:#fff;border:1px solid var(--line);border-radius:12px;padding:26px;color:var(--muted)}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ============================================================
   CONFIG — fill these two in with your Supabase project values
   (Settings -> API). The anon/public key is safe to embed here.
   ============================================================ */
const SUPABASE_URL = "https://jhazoukuewglpfdvbwpb.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpoYXpvdWt1ZXdnbHBmZHZid3BiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5MDg3MDUsImV4cCI6MjA5ODQ4NDcwNX0.9-hp5yidBz1VrD2wsKBzY25ZYwyHmIuWqWl5Bvak3HI";

/* ---------- tiny Supabase REST helpers (no library) ---------- */
const SB = {
  token: null, refresh: null, user: null,
  save(s){ this.token=s.access_token; this.refresh=s.refresh_token;
    localStorage.setItem('nhs_sess', JSON.stringify({a:s.access_token,r:s.refresh_token})); },
  load(){ try{ const s=JSON.parse(localStorage.getItem('nhs_sess')); if(s){this.token=s.a;this.refresh=s.r;return true;} }catch(e){} return false; },
  clear(){ this.token=this.refresh=this.user=null; localStorage.removeItem('nhs_sess'); },
  async login(email,password){
    const r = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`,{
      method:'POST',headers:{apikey:SUPABASE_ANON_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({email,password})});
    const d = await r.json(); if(!r.ok) throw new Error(d.error_description||d.msg||'Login failed');
    this.save(d); return d;
  },
  async signup(email,password){
    const r = await fetch(`${SUPABASE_URL}/auth/v1/signup`,{
      method:'POST',headers:{apikey:SUPABASE_ANON_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({email,password})});
    const d = await r.json(); if(!r.ok) throw new Error(d.error_description||d.msg||'Sign-up failed');
    if(d.access_token) this.save(d); return d;
  },
  async doRefresh(){
    if(!this.refresh) return false;
    const r = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`,{
      method:'POST',headers:{apikey:SUPABASE_ANON_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({refresh_token:this.refresh})});
    if(!r.ok){ this.clear(); return false; }
    this.save(await r.json()); return true;
  },
  async me(){
    const r = await this.authGet(`${SUPABASE_URL}/auth/v1/user`);
    if(!r) return null; this.user = r; return r;
  },
  async authGet(url){
    let res = await fetch(url,{headers:{apikey:SUPABASE_ANON_KEY,Authorization:`Bearer ${this.token}`}});
    if(res.status===401 && await this.doRefresh())
      res = await fetch(url,{headers:{apikey:SUPABASE_ANON_KEY,Authorization:`Bearer ${this.token}`}});
    if(!res.ok) return null; return res.json();
  },
  rest(path){ return this.authGet(`${SUPABASE_URL}/rest/v1/${path}`); }
};

/* ---------- formatting ---------- */
const gbp = v => '£'+Number(v||0).toLocaleString('en-GB',{maximumFractionDigits:0});
const num = v => Number(v||0).toLocaleString('en-GB');
const el = document.getElementById('app');
const LOGO = `<div class="logo"><span class="mark">h</span>harmony<small>NHS BD</small></div>`;

/* ---------- state ---------- */
let profile=null, period='week', tab='leadgen', lgProfiles=[];

/* ============================================================
   LOGIN VIEW
   ============================================================ */
function renderLogin(mode){
  mode = mode||'login';
  el.innerHTML = `<div class="login-wrap"><form class="login" id="lf">
    ${LOGO.replace('class="logo"','class="logo"')}
    <h3>${mode==='login'?'Sign in':'Set your password'}</h3>
    <p class="hint">${mode==='login'?'NHS Business Development team':'First time? Create your password below.'}</p>
    <label class="f">Work email</label>
    <input id="em" type="email" autocomplete="username" placeholder="you@harmonyfire.com"/>
    <label class="f">Password</label>
    <input id="pw" type="password" autocomplete="${mode==='login'?'current-password':'new-password'}" placeholder="••••••••"/>
    <button class="btn" id="go">${mode==='login'?'Sign in':'Create password & sign in'}</button>
    <button type="button" class="btn secondary" id="sw">${mode==='login'?"First time? Set your password":'Back to sign in'}</button>
    <div class="err" id="er"></div>
  </form></div>`;
  document.getElementById('sw').onclick=()=>renderLogin(mode==='login'?'signup':'login');
  document.getElementById('lf').onsubmit=async(e)=>{
    e.preventDefault();
    const b=document.getElementById('go'), er=document.getElementById('er');
    const email=document.getElementById('em').value.trim(), pw=document.getElementById('pw').value;
    if(!email||!pw){er.textContent='Enter your email and password.';return;}
    b.disabled=true; er.textContent='';
    try{
      if(mode==='login') await SB.login(email,pw); else await SB.signup(email,pw);
      if(!SB.token){ er.textContent='Check your inbox to confirm, then sign in.'; b.disabled=false; return; }
      await boot();
    }catch(err){ er.textContent=err.message; b.disabled=false; }
  };
}

/* ============================================================
   APP SHELL
   ============================================================ */
function tabsFor(p){
  const t=[];
  if(p.role==='admin'||p.team==='management'){ t.push(['leadgen','Lead Gen'],['bd','BD'],['mgmt','Management']); }
  else if(p.team==='lead_gen'){ t.push(['leadgen','Lead Gen']); }
  else if(p.team==='bd'){ t.push(['bd','BD']); }
  if(p.is_rock_owner||p.role==='admin'||p.team==='management') t.push(['rocks','Rocks']);
  t.push(['bonus','Bonus'],['huddle','Huddle']);
  if(p.role==='admin') t.push(['admin','Admin']);
  return t;
}
function renderShell(body){
  const tabs=tabsFor(profile).map(([k,l])=>`<button data-t="${k}" class="${tab===k?'active':''}">${l}</button>`).join('');
  el.innerHTML=`<header>${LOGO}<nav>${tabs}</nav>
    <div class="who">${profile.full_name} · ${profile.team.replace('_',' ')}<button id="out">Sign out</button></div></header>
    <main id="main">${body}</main>`;
  document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>{tab=b.dataset.t;route();});
  document.getElementById('out').onclick=()=>{SB.clear();renderLogin();};
}

/* ---------- period toggle ---------- */
function periodToggle(){
  return `<div class="toggle">${['week','month','quarter'].map(p=>
    `<button data-p="${p}" class="${period===p?'active':''}">${p[0].toUpperCase()+p.slice(1)}</button>`).join('')}</div>`;
}
function wirePeriod(){ document.querySelectorAll('.toggle button').forEach(b=>b.onclick=()=>{period=b.dataset.p;route();}); }

/* ---------- metric card ---------- */
function card(label, value, isMoney, target){
  let bar='', tgt='', pill='';
  if(target){
    const pct=Math.min(100,Math.round((value/target)*100));
    bar=`<div class="bar"><i style="width:${pct}%;background:${value>=target?'var(--good)':'var(--navy)'}"></i></div>`;
    tgt=`<div class="tgt">Target ${isMoney?gbp(target):num(target)} · ${pct}%</div>`;
    pill=`<span class="pill ${value>=target?'good':'bad'}">${value>=target?'On target':'Behind'}</span>`;
  }
  return `<div class="card"><div class="label">${label}${pill}</div>
    <div class="val">${isMoney?gbp(value):num(value)}</div>${tgt}${bar}</div>`;
}

/* ============================================================
   LEAD GEN DASHBOARD
   ============================================================ */
const LG_METRICS=[['meetings_booked','Meetings booked',false],['meetings_held','Meetings held',false],
  ['outbound_calls','Outbound calls',false],['connected_calls','Connected calls',false],
  ['oppys_created','Oppys generated (£)',true]];

async function viewLeadGen(){
  renderShell(`<h1>Lead Gen</h1><div class="sub">Kyle &amp; Flynn · vs target</div>${periodToggle()}
    <div id="lg">Loading…</div>`);
  wirePeriod();
  // profiles for labels
  if(!lgProfiles.length){ lgProfiles = await SB.rest(`profile?team=eq.lead_gen&select=full_name,sf_user_id`)||[]; }
  const rows = await SB.rest(`metric_latest?period_type=eq.${period}&select=metric,sf_user_id,value,period_start`) || [];
  const targets = await SB.rest(`target?team=eq.lead_gen&period=eq.${period}&select=metric,scope,value`) || [];
  const box=document.getElementById('lg');
  if(!rows.length){ box.innerHTML=`<div class="empty">No data yet — the Salesforce sync hasn't run for this ${period}.<br/>Once the 4×/day pull runs, live numbers appear here.</div>`; return; }
  const latest = rows.reduce((m,r)=>r.period_start>m?r.period_start:m,''); // current period
  const cur = rows.filter(r=>r.period_start===latest);
  const get=(metric,sf)=>{const r=cur.find(x=>x.metric===metric && (sf?x.sf_user_id===sf:!x.sf_user_id)); return r?Number(r.value):0;};
  const tgt=(metric,scope)=>{const t=targets.find(x=>x.metric===metric&&x.scope===scope); return t?Number(t.value):null;};

  let html='';
  // per person
  for(const p of lgProfiles){
    html+=`<div class="group"><h2>${p.full_name}</h2><div class="cards">`;
    for(const [m,label,money] of LG_METRICS)
      html+=card(label,get(m,p.sf_user_id),money, tgt(m,'person'));
    html+=`</div></div>`;
  }
  // team
  html+=`<div class="group"><h2>Lead Gen — team</h2><div class="cards">`;
  for(const [m,label,money] of LG_METRICS)
    html+=card(label,get(m,null),money, tgt(m,'team'));
  html+=`</div></div>`;
  box.innerHTML=html;
}

/* ============================================================
   PLACEHOLDER VIEWS (built next)
   ============================================================ */
function soon(title,note){ renderShell(`<h1>${title}</h1><div class="sub">${note}</div>
  <div class="soon">This section is next on the build list. The data model and security for it are already in place.</div>`); }

function route(){
  switch(tab){
    case 'leadgen': return viewLeadGen();
    case 'bd':      return soon('BD','Larson &amp; Royce · meetings + handovers to CR (actual &amp; forecast)');
    case 'mgmt':    return soon('Management','Lead Gen &amp; BD snapshots with drill-down');
    case 'rocks':   return soon('Key Rocks','Top-3 daily rocks + notifications');
    case 'bonus':   return soon('Bonus tracker','Monthly team handovers → % unlocked + £ to next tier');
    case 'huddle':  return soon('Morning Huddle','Fresh daily overview for the LG huddle');
    case 'admin':   return soon('Admin','Targets, users &amp; config');
    default:        return viewLeadGen();
  }
}

/* ============================================================
   BOOT
   ============================================================ */
async function boot(){
  const u = await SB.me();
  if(!u){ SB.clear(); return renderLogin(); }
  const rows = await SB.rest(`profile?user_id=eq.${u.id}&select=*`);
  if(!rows || !rows.length){
    el.innerHTML=`<div class="login-wrap"><div class="login">${LOGO}
      <h3>No access</h3><p class="hint">This login isn't on the NHS BD team list. Ask Kyle to add you.</p>
      <button class="btn" onclick="SB.clear();location.reload()">Sign out</button></div></div>`; return;
  }
  profile = rows[0];
  tab = tabsFor(profile)[0][0];
  route();
}

if(SUPABASE_URL.includes('YOUR-PROJECT')){
  el.innerHTML=`<div class="login-wrap"><div class="login">${LOGO}
    <h3>Almost there</h3><p class="hint">Add your Supabase Project URL and anon key at the top of this file, then reload.</p></div></div>`;
} else if(SB.load()){ boot(); } else { renderLogin(); }
</script>
</body>
</html>
