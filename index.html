<style>

  .two{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:760px){.two{grid-template-columns:1fr}}

  .lad .lv{width:72px;text-align:right;font-weight:600;font-size:12.5px}.lad .lc{width:18px;text-align:center;font-weight:800;color:var(--good)}

  .lgd{display:flex;gap:16px;font-size:11.5px;color:var(--ink-2);font-weight:500;margin-top:6px}.lgd span{display:inline-flex;align-items:center;gap:6px}.lgd i{width:14px;height:3px;border-radius:2px;display:inline-block}
  .hl{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
  .hi{display:flex;gap:12px;align-items:flex-start;padding:13px 18px;border-bottom:1px solid var(--line-2)}.hi:last-child{border-bottom:0}

/* Rocks (live via Supabase, 3 shown, up to 5) */
let RC={profiles:[],rocks:[],notifs:[]};
async function loadRocks(){const today=ymd(new Date());
  const [profiles,rocks,notifs]=await Promise.all([SB.rest(`profile?select=user_id,full_name,is_rock_owner`),SB.rest(`rock?select=*&rock_date=eq.${today}`),SB.rest(`notification?select=*&order=created_at.desc&limit=20`)]);
  RC={profiles:profiles||[],rocks:rocks||[],notifs:notifs||[]};}
function uidForName(n){const p=RC.profiles.find(x=>x.full_name===n);return p?p.user_id:null;}
let myShown=3;
async function renderRocks(){
  document.getElementById("out").innerHTML=`<div class="empty">Loading the board…</div>`;
  try{await loadRocks();}catch(e){document.getElementById("out").innerHTML=`<div class="board"><div class="empty" style="color:var(--bad)">Couldn't load Rocks: ${esc(e.message)}</div></div>`;return;}
  const todayLabel=new Date().toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"});
  const byUser={};for(const r of RC.rocks){(byUser[r.user_id]=byUser[r.user_id]||{})[r.position]=r;}
  let posted=0,doneAll=0;
  const cards=ROCK_OWNERS.map(o=>{const uid=uidForName(o.name),rs=uid?byUser[uid]||{}:{};
    const filled=[1,2,3,4,5].filter(i=>rs[i]&&rs[i].text),has=filled.length,dn=filled.filter(i=>rs[i].done).length;
    if(has>=3)posted++;if(has>0&&dn===has)doneAll++;const isMe=uid&&uid===SB.uid;
    const status=has===0?'<span style="font-size:10px;font-weight:700;padding:3px 9px;border-radius:6px;background:var(--bg);color:var(--muted)">Not posted</span>':(dn===has?'<span style="font-size:10px;font-weight:700;padding:3px 9px;border-radius:6px;background:var(--good-bg);color:var(--good)">All done ✓</span>':`<span style="font-size:10px;font-weight:700;padding:3px 9px;border-radius:6px;background:var(--brand-soft);color:var(--brand)">${dn}/${has} done</span>`);
    let body;
    if(isMe){const n=Math.max(3,myShown,has);const rowsN=Math.min(5,n);
      let rowsHtml="";for(let i=1;i<=rowsN;i++){const r=rs[i]||{};rowsHtml+=`<div class="rockrow"><div class="cb ${r.done?'on':''}" data-done="${i}">${r.done?'✓':''}</div><input class="ri" data-pos="${i}" placeholder="Rock ${i}${i>3?' (optional)':''}…" value="${esc(r.text||'')}"/></div>`;}
      body=rowsHtml+`<div class="rockfoot">${rowsN<5?`<button class="radd" id="radd">+ Add rock</button>`:''}<button class="rsave" id="rsave">Save</button></div>`;
    }else{let rowsHtml="";const cnt=Math.max(3,has);for(let i=1;i<=cnt;i++){const r=rs[i]||{};rowsHtml+=`<div class="rockrow"><div class="cb ${r.done?'on':''}">${r.done?'✓':''}</div><div class="rt ${r.done?'done':''}">${r.text?esc(r.text):'<span style="color:var(--muted-2)">—</span>'}</div></div>`;}body=rowsHtml;}
    return `<div class="rockcard ${isMe?'me':''}"><div class="ph"><div class="ava">${initials(o.name)}</div><div><div class="pn">${esc(o.name)}${isMe?' <span class="tg">you</span>':''}</div><div class="pr">${o.team}</div></div><div style="margin-left:auto">${status}</div></div>${body}</div>`;}).join("");
  const feed=RC.notifs.length?RC.notifs.map(n=>`<div class="fitem"><div class="fdot" style="background:${n.type==='rocks_completed'?'var(--good)':'var(--brand)'}"></div><div class="ft">${esc(n.message)}</div><div class="fw">${new Date(n.created_at).toLocaleString("en-GB",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"})}</div></div>`).join(""):`<div class="empty">No notifications yet today.</div>`;
  document.getElementById("out").innerHTML=`<div class="bar"><div class="lead">${todayLabel} · top priorities</div><div class="chips"><span class="chip acc"><b>${posted}</b>/4 posted</span><span class="chip good"><b>${doneAll}</b>/4 cleared</span></div></div>
    <div class="sec">Today's board<span class="rule"></span></div><div class="people">${cards}</div>
    <div class="sec">Notifications<span class="rule"></span></div><div class="board feed">${feed}</div>
    <div class="note">Post your top 3 each morning (add up to 5) and tick them off. Everyone is notified when you post all 3 and when you clear them. Rock owners: Kyle, Royce, Larson, Flynn.</div>`;
  const addBtn=document.getElementById("radd");if(addBtn)addBtn.onclick=()=>{myShown=Math.min(5,Math.max(3,myShown)+1);renderRocks();};
  const saveBtn=document.getElementById("rsave");
  if(saveBtn){
    document.querySelectorAll('.cb[data-done]').forEach(cb=>cb.onclick=async()=>{const pos=+cb.dataset.done,inp=document.querySelector(`.ri[data-pos="${pos}"]`);
      if(!inp.value.trim()){toast("Add the rock text first, then tick it.");return;}
      cb.classList.toggle('on');cb.textContent=cb.classList.contains('on')?'✓':'';
      try{await saveRock(pos,inp.value.trim(),cb.classList.contains('on'));await afterRock(false);}catch(e){toast("Save failed: "+e.message);}});
    saveBtn.onclick=async()=>{saveBtn.disabled=true;saveBtn.textContent="Saving…";
      try{const inps=document.querySelectorAll('.ri');for(const inp of inps){const i=+inp.dataset.pos,cb=document.querySelector(`.cb[data-done="${i}"]`);if(inp.value.trim())await saveRock(i,inp.value.trim(),cb.classList.contains('on'));}await afterRock(true);}
      catch(e){toast("Save failed: "+e.message);saveBtn.disabled=false;saveBtn.textContent="Save";}};
  }
}
async function saveRock(pos,text,done){await SB.rest(`rock?on_conflict=user_id,rock_date,position`,{method:'POST',headers:{Prefer:'resolution=merge-duplicates,return=minimal'},body:{user_id:SB.uid,rock_date:ymd(new Date()),position:pos,text,done:!!done,done_at:done?new Date().toISOString():null}});}
async function afterRock(fromSave){const today=ymd(new Date());
  const mine=await SB.rest(`rock?select=*&user_id=eq.${SB.uid}&rock_date=eq.${today}`);
  const filled=(mine||[]).filter(r=>r.text),posted=filled.length,done=filled.filter(r=>r.done).length;
  const dayRows=await SB.rest(`rock_day?select=*&user_id=eq.${SB.uid}&rock_date=eq.${today}`),day=(dayRows&&dayRows[0])||{},nm=ME.name||SB.email;
  if(fromSave&&posted>=3&&!day.submitted_at){await SB.rest(`rock_day?on_conflict=user_id,rock_date`,{method:'POST',headers:{Prefer:'resolution=merge-duplicates,return=minimal'},body:{user_id:SB.uid,rock_date:today,submitted_at:new Date().toISOString(),completed_at:day.completed_at||null}});await notify('rocks_uploaded',`${nm} posted today's top priorities`);toast("Posted — team notified");}
  if(posted>0&&done===posted&&!day.completed_at){await SB.rest(`rock_day?on_conflict=user_id,rock_date`,{method:'POST',headers:{Prefer:'resolution=merge-duplicates,return=minimal'},body:{user_id:SB.uid,rock_date:today,submitted_at:day.submitted_at||new Date().toISOString(),completed_at:new Date().toISOString()}});await notify('rocks_completed',`${nm} cleared all their rocks`);toast("All cleared — nice work.");}
  renderRocks();
}
async function notify(type,message){try{await SB.rest(`notification`,{method:'POST',headers:{Prefer:'return=minimal'},body:{type,actor:SB.uid,message}});}catch(e){}}
let lastNotifId=+(localStorage.getItem('nhs_last_notif')||0);
async function pollNotifs(){try{const rows=await SB.rest(`notification?select=id,message,actor&order=id.desc&limit=5`);if(rows&&rows.length){const newest=rows[0].id;if(lastNotifId&&newest>lastNotifId){for(const n of rows.filter(x=>x.id>lastNotifId).reverse()){if(n.actor!==SB.uid)toast(n.message);}}lastNotifId=newest;localStorage.setItem('nhs_last_notif',newest);}}catch(e){}}
function toast(msg){const t=document.getElementById("toast");t.innerHTML=`<div class="toast"><span class="dot"></span><span>${esc(msg)}</span></div>`;clearTimeout(window._tt);window._tt=setTimeout(()=>t.innerHTML="",5000);}

function drill(el){
  const m=el.dataset.m,scope=el.dataset.scope,who=el.dataset.who,hp=el.dataset.hp;
  if(m==="handover"){window.open(`${SFB}/lightning/r/Report/${RPT.handover}/view`,"_blank","noopener");return;}
  if(m!=="oppys"){window.open(`${SFB}/lightning/r/Report/${(m==="booked"||m==="held")?RPT.meetings:RPT.calls}/view`,"_blank","noopener");return;}
  const key=hp||lgKey(),d=SNAP.lg[key];if(!d.opps){window.open(`${SFB}/lightning/o/Report/home`,"_blank","noopener");return;}
  let opps=d.opps.slice(),whoName="Team";
  if(scope==="person"||scope==="gen"){opps=opps.filter(o=>o[4]===who);whoName=(opps[0]&&opps[0][3])||"Generator";}
  const tot=opps.reduce((a,o)=>a+o[7],0),mo=document.getElementById("modal");
  mo.innerHTML=`<div class="ov" id="ov"><div class="modal"><div class="mh"><div><div class="mt">Oppys generated</div><div class="ms">${esc(whoName)} · ${periodWord()}</div></div><button id="mc">✕</button></div><div class="msum"><div>Opportunities<b>${num(opps.length)}</b></div><div>Total value<b>${full(tot)}</b></div></div><div class="mb"><table><thead><tr><th>Opportunity</th><th>Account</th><th>Generator</th><th>Owner</th><th>Stage</th><th class="n">Value</th></tr></thead><tbody>`+opps.map(o=>`<tr><td><a href="${SFB}/lightning/r/Opportunity/${o[0]}/view" target="_blank" rel="noopener">${esc(o[1])} ↗</a></td><td>${esc(o[2])}</td><td>${esc(o[3])}</td><td>${esc(o[5])}</td><td>${esc(o[6])}</td><td class="n">${full(o[7])}</td></tr>`).join("")+`</tbody></table>${opps.length?"":'<div class="empty">No opportunities.</div>'}</div></div></div>`;
  document.getElementById("mc").onclick=()=>mo.innerHTML="";document.getElementById("ov").onclick=e=>{if(e.target.id==="ov")mo.innerHTML="";};
}

const NAVDEF=[{v:"huddle",g:"Overview",label:"Morning Huddle",ic:'<path d="M12 3l9 5-9 5-9-5 9-5zM3 13l9 5 9-5"/>'},{v:"bonus",g:"Overview",label:"Bonus",ic:'<path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>'},{v:"leadgen",g:"Teams",label:"Lead Gen",ic:'<path d="M3 13h4v8H3zM10 3h4v18h-4zM17 9h4v12h-4z"/>'},{v:"bd",g:"Teams",label:"Business Dev",ic:'<path d="M4 7h16M4 12h16M4 17h10"/>'},{v:"mgmt",g:"Teams",label:"Management",ic:'<circle cx="12" cy="8" r="3.6"/><path d="M4.5 20c0-3.6 3.4-5.5 7.5-5.5s7.5 1.9 7.5 5.5"/>'},{v:"rocks",g:"Teams",label:"Key Rocks",ic:'<path d="M12 2l3 6 6 .5-4.5 4 1.5 6-6-3.5L6 18.5 7.5 12 3 8.5 9 8z"/>'}];
function canSee(v){const t=ME.team,adm=ME.role==='admin'||ME.role==='manager';
  if(v==="huddle"||v==="bonus")return true;
  if(v==="leadgen")return t==='lead_gen'||t==='management'||adm;
  if(v==="bd")return t==='bd'||t==='management'||adm;
  if(v==="mgmt")return t==='management'||adm;
  if(v==="rocks")return ME.is_rock_owner||t==='management'||adm;
  return false;}
function usesPeriod(){return view==="leadgen"||view==="bd"||view==="mgmt";}
function usesStepper(){return view!=="rocks";}
function paint(showSeg,html){document.getElementById("out").innerHTML=html;document.querySelectorAll("#out [data-m]").forEach(el=>el.onclick=()=>drill(el));}
function syncControls(){document.getElementById("pc").style.visibility=usesStepper()?"visible":"hidden";document.getElementById("gran").style.display=usesPeriod()?"":"none";
  document.getElementById("rng").textContent=labelFor(usesPeriod()?G:"month",O);document.getElementById("nextb").disabled=O>=0;
  document.querySelectorAll("#gran button").forEach(b=>b.classList.toggle("active",b.dataset.g===G));}
function route(){if(!canSee(view))view="huddle";
  document.querySelectorAll("#nav a").forEach(a=>a.classList.toggle("active",a.dataset.v===view));
  const titles={huddle:["Morning Huddle","Everything for the daily stand-up"],leadgen:["Lead Gen","Actual vs target · pace to date"],bd:["Business Development","Handovers to CR · actual & forecast"],mgmt:["Management","Lead Gen + BD overview"],bonus:["Bonus","Monthly bonus on actual handovers"],rocks:["Key Rocks","Daily top priorities"]};
  document.getElementById("ptitle").textContent=titles[view][0];document.getElementById("psub").textContent=titles[view][1];syncControls();
  if(view==="bd")renderBD();else if(view==="mgmt")renderMgmt();else if(view==="bonus")renderBonus();else if(view==="rocks")renderRocks();else if(view==="leadgen")renderLeadGen();else renderHuddle();}

function renderApp(){
  const roleLabel={admin:"Admin",manager:"Manager",member:"Member"}[ME.role]||"Member",teamLabel={lead_gen:"Lead Gen",bd:"Business Dev",management:"Management"}[ME.team]||"";
  let navHtml="",lastG="";NAVDEF.filter(n=>canSee(n.v)).forEach(n=>{if(n.g!==lastG){navHtml+=`<div class="navlbl">${n.g}</div>`;lastG=n.g;}navHtml+=`<a data-v="${n.v}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">${n.ic}</svg> ${n.label}${n.v==='rocks'&&ME.is_rock_owner?'<span class="tag">YOU</span>':''}</a>`;});
  document.getElementById("root").innerHTML=`<div class="app"><aside class="side"><div class="brand">${LOGO}</div><nav class="nav" id="nav">${navHtml}</nav>
    <div class="sfoot"><div class="who"><span class="dot"></span>${esc(ME.name||SB.email||"")}</div><div class="rl">${teamLabel} · ${roleLabel}</div><button onclick="SB.clear();location.reload()">Sign out</button></div></aside>
    <main class="main"><div class="top"><div><h1 id="ptitle">Morning Huddle</h1><div class="sub" id="psub"></div></div>
      <div class="pc" id="pc"><div class="seg" id="gran"><button data-g="week">Week</button><button data-g="month" class="active">Month</button><button data-g="quarter">Quarter</button></div>
      <div class="step"><button id="prevb">‹</button><span class="rng" id="rng">This month</span><button id="nextb" disabled>›</button></div></div></div>
      <div class="content" id="out"></div></main></div>`;
  document.getElementById("gran").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;G=b.dataset.g;O=0;route();});
  document.getElementById("prevb").addEventListener("click",()=>{O-=1;route();});
  document.getElementById("nextb").addEventListener("click",()=>{if(O<0){O+=1;route();}});
  document.getElementById("nav").addEventListener("click",e=>{const a=e.target.closest("a");if(!a)return;view=a.dataset.v;O=0;route();});
  route();setInterval(pollNotifs,15000);pollNotifs();
}
async function loadMe(){try{const rows=await SB.rest(`profile?select=full_name,team,role,is_rock_owner&email=eq.${encodeURIComponent(SB.email)}`);
  if(rows&&rows[0])ME={name:rows[0].full_name,team:rows[0].team,role:rows[0].role,is_rock_owner:rows[0].is_rock_owner};else ME={name:SB.email,team:"management",role:"member",is_rock_owner:false};}catch(e){ME={name:SB.email,team:"management",role:"member",is_rock_owner:false};}}
function renderLogin(mode){mode=mode||"login";
  document.getElementById("root").innerHTML=`<div class="login-wrap"><form class="login" id="lf"><div class="lb">${LOGO}</div><h3>${mode==='login'?'Sign in':'Set your password'}</h3><p class="hint">${mode==='login'?'NHS Business Development team':'First time? Create your password.'}</p>
    <label class="f">Work email</label><input id="em" type="email" placeholder="you@harmonyfire.com"/><label class="f">Password</label><input id="pw" type="password" placeholder="••••••••"/>
    <button class="btn" id="go">${mode==='login'?'Sign in':'Create & sign in'}</button><button type="button" class="btn sec" id="sw">${mode==='login'?"First time? Set your password":'Back to sign in'}</button><div class="err" id="er"></div></form></div>`;
  document.getElementById("sw").onclick=()=>renderLogin(mode==='login'?'signup':'login');
  document.getElementById("lf").onsubmit=async e=>{e.preventDefault();const b=document.getElementById("go"),er=document.getElementById("er"),em=document.getElementById("em").value.trim(),pw=document.getElementById("pw").value;if(!em||!pw){er.textContent="Enter email and password.";return;}b.disabled=true;er.textContent="";
    try{if(mode==='login')await SB.login(em,pw);else await SB.signup(em,pw);if(!SB.t){er.textContent="Check your inbox to confirm, then sign in.";b.disabled=false;return;}await SB.me();await loadMe();renderApp();}catch(err){er.textContent=err.message;b.disabled=false;}};
}
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}
(async function(){if(SB.load()){const u=await SB.me();if(u){await loadMe();renderApp();return;}SB.clear();}renderLogin();})();
</script>
